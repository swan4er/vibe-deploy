# Fullstack Docker Compose — шаблон для монорепозитория
# Агент: адаптируй под проект:
# - Замени пути сборки (./apps/backend, ./apps/frontend) на реальные
# - Замени сервис db на нужную БД (MySQL, MongoDB) или удали, если БД управляемая
# - Подставь порты из анализа проекта

services:
  backend:
    build: ./apps/backend
    ports:
      - "${BACKEND_PORT:-3000}:${BACKEND_PORT:-3000}"
    environment:
      - DATABASE_URL=${DATABASE_URL}
      - PORT=${BACKEND_PORT:-3000}
    depends_on:
      db:
        condition: service_healthy
    restart: always

  frontend:
    build: ./apps/frontend
    ports:
      - "80:80"
    restart: always

  # === PostgreSQL (по умолчанию) ===
  # Для MySQL замени на: image: mysql:8, переменные MYSQL_DATABASE, MYSQL_USER, MYSQL_PASSWORD
  # Для MongoDB замени на: image: mongo:7, переменные MONGO_INITDB_ROOT_USERNAME, MONGO_INITDB_ROOT_PASSWORD
  # Если используешь управляемую БД от Timeweb — удали этот сервис и depends_on
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${DB_NAME}
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
    volumes:
      - pgdata:/var/lib/postgresql/data
    restart: always
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER} -d ${DB_NAME}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
