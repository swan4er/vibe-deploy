# Prerequisite: deploy key must be configured on the server
# See SKILL.md step 9.3 — SSH key for git pull must be set up before this workflow runs
name: Deploy to VPS (Node.js + PM2)
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/app
            git pull origin main
            npm ci --omit=dev
            npm run build
            pm2 restart app
