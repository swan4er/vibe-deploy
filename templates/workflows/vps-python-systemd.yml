# Prerequisite: deploy key must be configured on the server
# See SKILL.md step 9.3 — SSH key for git pull must be set up before this workflow runs
name: Deploy to VPS (Python + systemd)
on:
  push:
    branches: [main]
jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_IP }}
          username: root
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          script: |
            cd /opt/app
            git pull origin main
            source venv/bin/activate
            pip install -r requirements.txt
            systemctl restart app
